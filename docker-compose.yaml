version: '3.9'
services:
  frontend:
    build:
      context: .
      dockerfile: DockerfileCompose
      target: frontend
      tags:
        - "disconf-frontend:2.6.36"
        - "disconf-frontend:2.6.36-nginx-stable"
      labels:
        disconf.version: "2.6.36"
    container_name: disconf-frontend
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
    expose:
      - 8081
    ports:
      - "8081:8081"
    networks:
      - disconf-network
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
  backend:
    build:
      context: .
      dockerfile: DockerfileCompose
      target: backend
      tags:
        - "disconf-backend:2.6.36"
        - "disconf-backend:2.6.36-tomcat9"
      labels:
        disconf.version: "2.6.36"
    container_name: disconf-backend
    depends_on:
      - redis
      - mysql
      - zookeeper
    deploy:
      resources:
        limits:
          memory: "512M"
    environment:
      TZ: Asia/Shanghai
    expose:
      - 8080
    ports:
      - "8080:8080"
    networks:
      - disconf-network
    volumes:
      - ./logs/tomcat:/usr/local/tomcat/logs
      - ./conf/application.properties:/usr/local/tomcat/webapps/ROOT/WEB-INF/classes/application.properties
      - ./conf/jdbc-mysql.properties:/usr/local/tomcat/webapps/ROOT/WEB-INF/classes/jdbc-mysql.properties
      - ./conf/redis-config.properties:/usr/local/tomcat/webapps/ROOT/WEB-INF/classes/redis-config.properties
      - ./conf/zoo.properties:/usr/local/tomcat/webapps/ROOT/WEB-INF/classes/zoo.properties
      # - ./conf/server.xml:/usr/local/tomcat/webapps/conf/server.xml
  redis:
    image: docker.1ms.run/library/redis:6.2.21-alpine
    container_name: disconf-redis
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: "password"
    networks:
      - disconf-network
  mysql:
    build:
      context: .
      dockerfile: DockerfileCompose
      target: database
      tags:
        - "disconf-database:2.6.36-mysql57"
    container_name: disconf-mysql
    environment:
      TZ: Asia/Shangha
      MYSQL_ROOT_PASSWORD: "111111"
      MYSQL_DATABASE: disconf
    networks:
      - disconf-network
    volumes:
        # - ./conf/mysql:/etc/mysql/conf.d
        - ./data/mysql:/var/lib/mysql
        - ./data/mysql-files:/var/lib/mysql-files
        - ./logs/mysql:/var/log/mysql
  zookeeper:
    image: docker.1ms.run/library/zookeeper:3.9.4
    container_name: disconf-zookeeper
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "300M"
    environment:
      TZ: Asia/Shanghai
      JVMFLAGS: -Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status | grep -q 'Mode: ' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - disconf-network
    volumes:
      # - /opt/swarmdata/config/zoo.cfg:/conf/zoo.cfg
      - ./data/zoo/data:/data
      - ./data/zoo/datalog:/datalog
      - ./logs/zoo:/logs
networks:
  disconf-network:
    name: disconf-network


