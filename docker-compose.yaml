version: '3.9'
services:
  frontend:
    build:
      context: .
      dockerfile: DockerfileCompose
      target: frontend
      tags:
        - "disconf-frontend:2.6.36"
        - "disconf-frontend:2.6.36-nginx-stable"
      labels:
        disconf.version: "2.6.36"
    container_name: disconf-frontend
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
    expose:
      - 8081
    ports:
      - "8081:8081"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
  backend:
    build:
      context: .
      dockerfile: DockerfileCompose
      target: backend
      tags:
        - "disconf-backend:2.6.36"
        - "disconf-backend:2.6.36-tomcat9"
      labels:
        disconf.version: "2.6.36"
    container_name: disconf-backend
    depends_on:
      - redis
      - mysql
      - zookeeper
    environment:
      TZ: Asia/Shanghai
    expose:
      - 8080
    volumes:
      - ./logs:/usr/local/tomcat/logs
      - ./conf/application.properties:/usr/local/tomcat/webapps/ROOT/application.properties
      - ./conf/jdbc-mysql.properties:/usr/local/tomcat/webapps/ROOT/jdbc-mysql.properties
      - ./conf/redis-config.properties:/usr/local/tomcat/webapps/ROOT/redis-config.properties
      - ./conf/zoo.properties:/usr/local/tomcat/webapps/ROOT/zoo.properties
      # - ./conf/server.xml:/usr/local/tomcat/webapps/conf/server.xml
  redis:
    image: docker.1ms.run/library/redis:6.2.21-alpine
    container_name: disconf-redis
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: "password"
  mysql:
    build:
      context: .
      dockerfile: DockerfileCompose
      target: database
      tags:
        - "disconf-db:2.6.36-mysql57"
    container_name: disconf-mysql
    environment:
      TZ: Asia/Shangha
      MYSQL_ROOT_PASSWORD: "111111"
      MYSQL_DATABASE: disconf
  #    volumes:
  #    - ./data:/var/lib/mysql
  zookeeper:
    image: docker.1ms.run/library/zookeeper:3.9.4
    container_name: disconf-zookeeper
    environment:
      TZ: Asia/Shanghai


